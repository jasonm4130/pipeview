name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pipeview-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pipeview-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: pipeview-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pipeview-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz pipeview
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "darwin_arm64=$(sha256sum pipeview-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum pipeview-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum pipeview-linux-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum pipeview-linux-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/jasonm4130/homebrew-tap.git

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/pipeview.rb << 'FORMULA'
          class Pipeview < Formula
            desc "Real-time pipeline debugger — pv shows bytes, pipeview shows your data"
            homepage "https://github.com/jasonm4130/pipeview"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jasonm4130/pipeview/releases/download/v#{version}/pipeview-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              else
                url "https://github.com/jasonm4130/pipeview/releases/download/v#{version}/pipeview-darwin-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/jasonm4130/pipeview/releases/download/v#{version}/pipeview-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              else
                url "https://github.com/jasonm4130/pipeview/releases/download/v#{version}/pipeview-linux-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "pipeview"
            end

            test do
              assert_match "pipeview", shell_output("#{bin}/pipeview --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pipeview.rb
          git commit -m "pipeview ${{ steps.version.outputs.version }}"
          git push
