name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pipespy-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pipespy-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: pipespy-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pipespy-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz pipespy
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "darwin_arm64=$(sha256sum pipespy-darwin-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum pipespy-darwin-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum pipespy-linux-amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum pipespy-linux-arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Clone homebrew-tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/jasonm4130/homebrew-tap.git

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/pipespy.rb << 'FORMULA'
          class Pipespy < Formula
            desc "Real-time pipeline debugger — pv shows bytes, pipespy shows your data"
            homepage "https://github.com/jasonm4130/pipespy"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jasonm4130/pipespy/releases/download/v#{version}/pipespy-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              else
                url "https://github.com/jasonm4130/pipespy/releases/download/v#{version}/pipespy-darwin-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/jasonm4130/pipespy/releases/download/v#{version}/pipespy-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              else
                url "https://github.com/jasonm4130/pipespy/releases/download/v#{version}/pipespy-linux-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "pipespy"
            end

            test do
              assert_match "pipespy", shell_output("#{bin}/pipespy --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pipespy.rb
          git commit -m "pipespy ${{ steps.version.outputs.version }}"
          git push
